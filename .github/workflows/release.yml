name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: pramaan-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: pramaan-linux-aarch64.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: pramaan-macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: pramaan-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: pramaan-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build -p pramaan-cli --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/pramaan" dist/pramaan
          tar -C dist -czf "${{ matrix.archive }}" pramaan

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/pramaan.exe" dist/pramaan.exe
          Compress-Archive -Path dist/pramaan.exe -DestinationPath "${{ matrix.archive }}" -Force

      - name: Attest release artifact
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.archive }}

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
