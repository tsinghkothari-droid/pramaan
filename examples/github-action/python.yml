name: Pramaan Python

on:
  pull_request:

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  pramaan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pytest
      - uses: pramaan/pramaan@v0
        with:
          out-dir: target/pramaan
          upload-bundle: "true"
          fail-on: failed
