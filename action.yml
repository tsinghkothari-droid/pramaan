name: Pramaan
description: Run Pramaan on pull requests and publish a risk-aware proof bundle summary.
author: Pramaan

branding:
  icon: shield
  color: blue

inputs:
  base-ref:
    description: Base commit/ref to compare. Defaults to pull_request.base.sha when available.
    required: false
    default: ""
  head-ref:
    description: Head commit/ref to compare. Defaults to pull_request.head.sha when available.
    required: false
    default: ""
  bundle-path:
    description: Deprecated alias for out-dir. Directory where Pramaan writes the proof bundle.
    required: false
    default: ""
  out-dir:
    description: Directory where Pramaan writes the proof bundle.
    required: false
    default: target/pramaan
  artifact-name:
    description: Name for the uploaded proof bundle artifact.
    required: false
    default: pramaan-proof-bundle
  upload-artifact:
    description: Deprecated alias for upload-bundle.
    required: false
    default: ""
  upload-bundle:
    description: Upload the proof bundle with actions/upload-artifact.
    required: false
    default: "true"
  fail-on:
    description: "Failure policy: failed, actionable, or never."
    required: false
    default: failed
  policy-profile:
    description: "Built-in Pramaan policy profile for summary explanation."
    required: false
    default: private-preview
  attest:
    description: "Create a GitHub artifact attestation for the uploaded bundle. Requires id-token: write and attestations: write."
    required: false
    default: "false"
  pramaan-args:
    description: Extra arguments appended to `pramaan verify`.
    required: false
    default: ""

outputs:
  bundle-path:
    description: Directory containing the proof bundle.
    value: ${{ steps.paths.outputs.bundle_path }}
  manifest-path:
    description: Path to bundle.manifest.json.
    value: ${{ steps.paths.outputs.manifest_path }}
  summary-path:
    description: Path to the rendered GitHub summary markdown.
    value: ${{ steps.paths.outputs.summary_path }}
  final-status:
    description: Final bundle status reported by the Pramaan manifest.
    value: ${{ steps.final-status.outputs.final_status }}

runs:
  using: composite
  steps:
    - name: Resolve PR refs
      id: refs
      shell: bash
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/resolve-refs.mjs" \
          --base "${{ inputs.base-ref }}" \
          --head "${{ inputs.head-ref }}" \
          --github-output "$GITHUB_OUTPUT"

    - name: Resolve paths and policy
      id: config
      shell: bash
      run: |
        set -euo pipefail
        out_dir="${{ inputs.out-dir }}"
        if [ -z "$out_dir" ]; then
          out_dir="${{ inputs.bundle-path }}"
        fi
        if [ -z "$out_dir" ]; then
          out_dir="target/pramaan"
        fi
        upload_bundle="${{ inputs.upload-bundle }}"
        if [ -z "$upload_bundle" ]; then
          upload_bundle="${{ inputs.upload-artifact }}"
        fi
        if [ -z "$upload_bundle" ]; then
          upload_bundle="true"
        fi
        fail_on="${{ inputs.fail-on }}"
        case "$fail_on" in
          failed|actionable|never) ;;
          *) echo "Invalid fail-on value: $fail_on. Expected failed, actionable, or never." >&2; exit 2 ;;
        esac
        {
          echo "out_dir=$out_dir"
          echo "upload_bundle=$upload_bundle"
          echo "fail_on=$fail_on"
        } >> "$GITHUB_OUTPUT"

    - name: Build Pramaan CLI
      shell: bash
      run: |
        set -euo pipefail
        cargo build --locked -p pramaan-cli

    - name: Run Pramaan CLI
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ steps.config.outputs.out_dir }}"
        log_path="${{ steps.config.outputs.out_dir }}/pramaan.log"
        target/debug/pramaan verify \
          --base "${{ steps.refs.outputs.base_ref }}" \
          --head "${{ steps.refs.outputs.head_ref }}" \
          --out "${{ steps.config.outputs.out_dir }}" \
          ${{ inputs.pramaan-args }} 2>&1 | tee "$log_path"

    - name: Emit local offline attestation
      shell: bash
      run: |
        set -euo pipefail
        target/debug/pramaan bundle attest "${{ steps.config.outputs.out_dir }}" \
          | tee -a "${{ steps.config.outputs.out_dir }}/pramaan.log"

    - name: Render risk summary
      shell: bash
      run: |
        set -euo pipefail
        summary_path="${{ steps.config.outputs.out_dir }}/github-step-summary.md"
        target/debug/pramaan policy explain "${{ steps.config.outputs.out_dir }}" \
          --profile "${{ inputs.policy-profile }}" \
          | tee "${{ steps.config.outputs.out_dir }}/policy.log"
        cat "${{ steps.config.outputs.out_dir }}/policy.log" >> "${{ steps.config.outputs.out_dir }}/pramaan.log"
        node "$GITHUB_ACTION_PATH/render-summary.mjs" \
          --manifest "${{ steps.config.outputs.out_dir }}/bundle.manifest.json" \
          --log "${{ steps.config.outputs.out_dir }}/pramaan.log" \
          --out "$summary_path" \
          --base "${{ steps.refs.outputs.base_ref }}" \
          --head "${{ steps.refs.outputs.head_ref }}"
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Record wrapper outputs
      id: paths
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "bundle_path=${{ steps.config.outputs.out_dir }}"
          echo "manifest_path=${{ steps.config.outputs.out_dir }}/bundle.manifest.json"
          echo "summary_path=${{ steps.config.outputs.out_dir }}/github-step-summary.md"
        } >> "$GITHUB_OUTPUT"

    - name: Record final status
      id: final-status
      shell: bash
      run: |
        set -euo pipefail
        final_status="$(node -e "const fs=require('fs'); const m=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(m.final_status || 'unknown')" "${{ steps.config.outputs.out_dir }}/bundle.manifest.json")"
        echo "final_status=$final_status" >> "$GITHUB_OUTPUT"

    - name: Upload proof bundle
      if: ${{ steps.config.outputs.upload_bundle == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.config.outputs.out_dir }}
        if-no-files-found: error
        retention-days: 14

    - name: Attest proof bundle
      if: ${{ inputs.attest == 'true' }}
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: ${{ steps.config.outputs.out_dir }}/bundle.manifest.json

    - name: Apply failure policy
      shell: bash
      run: |
        set -euo pipefail
        final_status="${{ steps.final-status.outputs.final_status }}"
        fail_on="${{ steps.config.outputs.fail_on }}"
        if [ "$fail_on" = "never" ]; then
          exit 0
        fi
        if [ "$fail_on" = "failed" ] && [ "$final_status" = "failed" ]; then
          echo "Pramaan final_status=$final_status and fail-on=failed" >&2
          exit 1
        fi
        if [ "$fail_on" = "actionable" ] && [[ "$final_status" =~ ^(failed|error|inconclusive)$ ]]; then
          echo "Pramaan final_status=$final_status and fail-on=actionable" >&2
          exit 1
        fi
